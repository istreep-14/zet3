<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="hero → micro, with token + px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-mono); padding: 16px 18px; }
  .r { display:flex; align-items:baseline; gap:14px; padding:5px 0; border-bottom:1px solid var(--border); }
  .r:last-child { border-bottom:none; }
  .s { color: var(--text); font-weight:800; line-height:1.05; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tok { color:var(--muted); font-size:.56rem; width:120px; text-align:right; }
  .px { color:var(--muted-2); font-size:.52rem; width:56px; text-align:right; }
</style>
</head>
<body>
  <div class="r"><span class="s" style="font-size:var(--text-hero); color:var(--gold)">$1,284</span><span class="tok">--text-hero</span><span class="px">40px</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-2xl)">Total $642</span><span class="tok">--text-2xl</span><span class="px">26px</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-xl)">$214</span><span class="tok">--text-xl</span><span class="px">22px</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-lg)">$214</span><span class="tok">--text-lg</span><span class="px">19.5px</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-base); font-family:var(--font-sans)">Maya Rodriguez</span><span class="tok">--text-base</span><span class="px">16px</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-sm)">Body / value</span><span class="tok">--text-sm</span><span class="px">13.4px</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-caption); color:var(--text-2)">meta caption</span><span class="tok">--text-caption</span><span class="px">9.9px</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-tiny); letter-spacing:1.2px; text-transform:uppercase; color:var(--muted)">Section label</span><span class="tok">--text-tiny</span><span class="px">8.3px</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-micro); letter-spacing:.6px; text-transform:uppercase; color:var(--muted)">Role badge</span><span class="tok">--text-micro</span><span class="px">7px</span></div>
</body>
</html>
